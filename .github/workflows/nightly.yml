name: nightly

on:
  schedule:
    # 06:00 UTC every day = 14:00 CST. Captures fresh macOS beta + xcode
    # rollouts within ~24h of release.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  benchmarks:
    name: benchmarks
    runs-on: macos-15
    env:
      PULSE_RUN_BENCHMARKS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show Xcode / Swift versions
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-nightly-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-nightly-

      - name: Resolve packages
        run: swift package resolve

      # Benchmarks deliberately serial — they're timing-sensitive
      # and `--parallel` makes the two write/rollup tests share
      # cooperative threads with each other, hurting the numbers we
      # log for trend-watching. The full test suite below stays
      # parallel for speed.
      - name: Run benchmarks
        run: swift test --filter "WriterBenchmarks"

      - name: Run full test suite
        run: swift test --parallel
