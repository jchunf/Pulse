name: nightly

on:
  schedule:
    # 06:00 UTC every day = 14:00 CST. Captures fresh macOS beta + xcode
    # rollouts within ~24h of release.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  benchmarks:
    name: benchmarks
    runs-on: macos-15
    env:
      PULSE_RUN_BENCHMARKS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode / Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-nightly-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-nightly-

      - name: Resolve packages
        run: swift package resolve

      - name: Run benchmarks
        run: swift test --parallel --filter "WriterBenchmarks"

      - name: Run full test suite
        run: swift test --parallel
