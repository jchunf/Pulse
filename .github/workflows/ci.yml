name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The PR-comment step below needs write access to the PR conversation.
# Reads are given as a belt-and-suspenders safeguard.
permissions:
  contents: read
  pull-requests: write

# Cancel in-progress runs on the same PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build + test the PulseCore / PulseTestSupport targets on macOS 14 and 15.
  # Matches the support matrix nailed down in docs/09-open-questions.md Q-13.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: build-and-test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-14, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        # Pin Xcode 16+ on both runners so `import Testing` (Swift Testing)
        # is available — Xcode 15 ships Swift 5.10 without the bundled
        # Testing module. Both macos-14 and macos-15 images carry Xcode 16
        # alongside the older toolchain; this just chooses the new one.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show Xcode / Swift versions
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ matrix.runner }}-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-${{ matrix.runner }}-

      - name: Resolve packages
        run: swift package resolve 2>&1 | tee resolve.log

      - name: Build (all targets)
        run: swift build --build-tests 2>&1 | tee build.log

      - name: Test (with coverage)
        run: swift test --parallel --enable-code-coverage 2>&1 | tee test.log

      - name: Fail on hidden build / test errors in logs
        # Safety net. `swift test` has been observed exiting 0 even when
        # (a) one test sub-target fails to compile while another runs
        # cleanly, or (b) Swift Testing records runtime issues in
        # `#expect` / `#require` without flipping the overall exit code.
        # Both are silent regressions. Grep for every canonical failure
        # marker we've seen, and if any appears, fail the step so the
        # job conclusion faithfully reflects reality.
        if: always()
        run: |
          set +e
          PATTERNS=(
            '^[^[:space:]].*\.swift:[0-9]+:[0-9]+: error:'
            'recorded an issue at'
            'Expectation failed:'
            '^.{0,6}Test Case .* failed'
            '^✘ '
          )
          HITS=""
          for pat in "${PATTERNS[@]}"; do
            found=$(grep -HnE "$pat" build.log test.log 2>/dev/null || true)
            if [ -n "$found" ]; then
              HITS+="$found"$'\n'
            fi
          done
          if [ -n "$HITS" ]; then
            echo "::error::build or test failures found in logs but exit code was clean — failing explicitly"
            echo "$HITS" | head -80
            exit 1
          fi

      - name: Generate coverage report
        id: coverage
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          # Locate the xctest bundle SPM produces; name varies by package.
          XCTEST_BUNDLE=$(find "$BIN_PATH" -maxdepth 1 -name "*.xctest" -type d | head -n 1 || true)
          PROFDATA="$BIN_PATH/codecov/default.profdata"
          if [ -z "$XCTEST_BUNDLE" ] || [ ! -f "$PROFDATA" ]; then
            echo "Coverage outputs missing; skipping llvm-cov report."
            echo "percent=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BUNDLE_NAME=$(basename "$XCTEST_BUNDLE" .xctest)
          BINARY="$XCTEST_BUNDLE/Contents/MacOS/$BUNDLE_NAME"
          if [ ! -f "$BINARY" ]; then
            echo "Test binary not found at $BINARY; skipping."
            echo "percent=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          xcrun llvm-cov report \
            "$BINARY" \
            -instr-profile="$PROFDATA" \
            -ignore-filename-regex='\.build|Tests|TestSupport|\.swiftpm' \
            | tee coverage.txt
          PERCENT=$(awk '/^TOTAL/ {gsub("%","",$NF); print $NF}' coverage.txt || echo "0")
          echo "percent=${PERCENT:-0}" >> "$GITHUB_OUTPUT"

      - name: Enforce coverage threshold
        if: matrix.runner == 'macos-15'
        env:
          MIN_COVERAGE: 85
        run: |
          PCT="${{ steps.coverage.outputs.percent }}"
          if [ -z "$PCT" ] || [ "$(printf '%.0f' "$PCT")" -lt "$MIN_COVERAGE" ]; then
            echo "::warning::coverage ${PCT}% below target ${MIN_COVERAGE}% — see docs/10-testing-and-ci.md#四"
          else
            echo "coverage ${PCT}% OK (>= ${MIN_COVERAGE}%)"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.runner }}
          path: coverage.txt
          if-no-files-found: ignore

      - name: Upload build / test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.runner }}
          path: |
            resolve.log
            build.log
            test.log
          if-no-files-found: ignore

      - name: Post failure logs as PR comment
        # Self-debugging hook: paste log excerpts into the PR conversation
        # when CI fails. We rely on the "Fail on hidden compile errors in
        # logs" step above to promote silent compile errors to real failures,
        # so `if: failure()` now faithfully catches every case worth seeing.
        # Clean green runs and benign-warning runs post nothing.
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          {
            echo "## ❌ CI failed on \`${{ matrix.runner }}\`"
            echo ""
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            for log in resolve.log build.log test.log; do
              [ -s "$log" ] || continue
              # Match the same patterns as the truthfulness guard so the
              # PR comment always shows exactly what the guard tripped on.
              errors=$(grep -nE '^[^[:space:]].*\.swift:[0-9]+:[0-9]+: error:|recorded an issue at|Expectation failed:|^.{0,6}Test Case .* failed|^✘ |FAIL|Test Suite .* failed|Process completed with exit code' "$log" || true)
              if [ -n "$errors" ]; then
                echo "### \`$log\` — flagged lines"
                echo ""
                echo '```'
                echo "$errors" | head -80
                echo '```'
                echo ""
              fi
              echo "### \`$log\` — last 120 lines"
              echo ""
              echo '```'
              tail -120 "$log"
              echo '```'
              echo ""
            done
          } > /tmp/comment.md

          # Mirror to the run's step summary so logs are visible in Actions UI
          # even if the PR comment post fails.
          cat /tmp/comment.md >> "$GITHUB_STEP_SUMMARY"

          if ! gh pr comment ${{ github.event.pull_request.number }} \
                --body-file /tmp/comment.md \
                --repo ${{ github.repository }}; then
            echo "::warning::gh pr comment failed; see step summary for the payload"
            echo "=== would-be comment payload ==="
            cat /tmp/comment.md
          fi

  # ---------------------------------------------------------------------------
  # Lightweight lint pass — fast, independent, runs on every PR.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run lint script
        run: bash scripts/lint.sh
