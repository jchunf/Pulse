name: Package

# Build an ad-hoc-signed Pulse.app on a hosted macOS runner and hand it
# back as a downloadable artifact. No Apple Developer Secrets involved —
# the produced bundle behaves identically to `make app` run locally
# (ad-hoc codesign, triggers Gatekeeper on first launch, TCC permissions
# must be granted by the user on their own Mac).
#
# On a version tag push (v*) the same bundle is also attached to a
# GitHub Release so the maintainer can link friends at one URL. The
# release is marked as a pre-release until Developer ID signing +
# notarization land (see docs/07-distribution.md, tracked as v1.0
# blocker in CHANGELOG.md).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      universal:
        description: 'Build universal (arm64 + x86_64) binary'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: package (macos-15)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-package-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-package-

      - name: Derive version string
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            raw="${GITHUB_REF#refs/tags/v}"
            echo "version=$raw" >> "$GITHUB_OUTPUT"
            echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "artifact=Pulse-$raw" >> "$GITHUB_OUTPUT"
          else
            short="$(git rev-parse --short HEAD)"
            # main pushes produce a rolling dev build that lands on the
            # `dev-latest` GitHub Release (see "Publish rolling dev-latest"
            # step below); PR / manual dispatch runs keep the `-ci.` label
            # so the menu-bar version string makes the distinction obvious
            # ("0.0.0-dev.42+abc1234" = shippable-for-testers rolling build,
            # "0.0.0-ci.42+abc1234" = throwaway PR validation build).
            if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}+${short}" >> "$GITHUB_OUTPUT"
              echo "artifact=Pulse-dev-${short}" >> "$GITHUB_OUTPUT"
            else
              echo "version=0.0.0-ci.${GITHUB_RUN_NUMBER}+${short}" >> "$GITHUB_OUTPUT"
              echo "artifact=Pulse-ci-${short}" >> "$GITHUB_OUTPUT"
            fi
            echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package .app
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          # Default to universal for tag builds and when manual dispatch
          # asks for it; native-only for main / PR runs (keeps feedback
          # fast). GHA string '0' is truthy, so we can't chain `||` on
          # the result — collapse the condition to one ternary.
          UNIVERSAL: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.universal)) && '1' || '0' }}
        run: bash scripts/package.sh

      - name: Zip bundle
        id: zip
        working-directory: dist
        run: |
          zip_name="${{ steps.version.outputs.artifact }}.zip"
          # `ditto -c -k --keepParent` is the Apple-recommended way to
          # zip a .app — it preserves extended attributes (including the
          # codesign signature) that `zip -r` would quietly strip.
          ditto -c -k --keepParent Pulse.app "$zip_name"
          echo "zip_path=dist/$zip_name" >> "$GITHUB_OUTPUT"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$zip_name" | tee "$zip_name.sha256"

      # DMG is the human-facing install artifact. The mounted image
      # holds Pulse.app + a symlink to /Applications so testers get
      # the canonical drag-to-install affordance — and importantly
      # fixes Sparkle's "must be in Applications folder" refusal
      # once the user completes the drag.
      #
      # Sparkle still pulls the .zip for auto-update (see the sign +
      # appcast steps below); DMG is strictly for first install.
      - name: Build DMG
        id: dmg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash scripts/build_dmg.sh
          dmg_name="Pulse-${{ steps.version.outputs.version }}.dmg"
          echo "dmg_path=dist/$dmg_name" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$dmg_name" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact }}
          path: |
            ${{ steps.zip.outputs.zip_path }}
            ${{ steps.zip.outputs.zip_path }}.sha256
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sha256
          # Pre-release artifacts are cheap; a week is enough for the
          # maintainer to grab or for anyone reviewing a PR to try it.
          retention-days: 14
          if-no-files-found: error

      # Rolling pre-release off `main` so testers can grab a fresh
      # `.dmg` without waiting on a hand-cut `vX.Y.Z` tag. Same artefacts
      # as tag builds, just attached to the fixed `dev-latest` tag —
      # delete + recreate on every merge so the tag follows `main`.
      # Explicitly *not* served through Sparkle (the appcast generation
      # below is gated on `refs/tags/v*`), so beta / stable channel
      # subscribers are not pulled into this firehose.
      - name: Publish rolling dev-latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # `gh release create`'s `#label` syntax only sets the UI
          # display label — the downloadable filename is still the
          # source file's basename. So to give testers the bookmarkable
          # `.../releases/download/dev-latest/Pulse.dmg` URL we have to
          # physically copy the versioned artefacts to a stable name
          # before upload.
          stable_dir="$RUNNER_TEMP/dev-latest-assets"
          rm -rf "$stable_dir"
          mkdir -p "$stable_dir"
          cp "${{ steps.zip.outputs.zip_path }}" "$stable_dir/Pulse.zip"
          cp "${{ steps.zip.outputs.zip_path }}.sha256" "$stable_dir/Pulse.zip.sha256"
          cp "${{ steps.dmg.outputs.dmg_path }}" "$stable_dir/Pulse.dmg"
          cp "${{ steps.dmg.outputs.dmg_path }}.sha256" "$stable_dir/Pulse.dmg.sha256"

          # First run on a fresh clone has no dev-latest; `|| true`
          # keeps the step idempotent in either case. --cleanup-tag
          # drops the old git tag so the new `release create` can
          # re-point it at the current SHA without a stale tag object.
          gh release delete dev-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create dev-latest \
            --title "Pulse dev — ${{ steps.version.outputs.version }}" \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --notes "Rolling build of \`main\` @ \`${GITHUB_SHA}\`. Replaced on every merge — stable download URLs are \`.../releases/download/dev-latest/Pulse.dmg\` and \`.../Pulse.zip\`. Not served through Sparkle; stable / beta auto-update users are unaffected." \
            "$stable_dir/Pulse.zip" \
            "$stable_dir/Pulse.zip.sha256" \
            "$stable_dir/Pulse.dmg" \
            "$stable_dir/Pulse.dmg.sha256"

      # Sparkle appcast publishing is gated on "is this tag a stable
      # final?" — `v1.0.0` yes, `v1.0.0-rc2` no. rc / beta builds still
      # get a GitHub Release (tagged as pre-release) but no appcast.xml,
      # so the Sparkle clients listed in `releases/latest/download/`
      # only auto-update between stable finals. See PR #64 for the
      # client-side wiring and the plan in /reviews for the two-PR
      # rationale.
      - name: Detect stable-final tag
        id: channel
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign update zip (EdDSA)
        id: sign
        if: steps.channel.outputs.is_stable == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        # Verbose per-stage logging so if any sub-command fails
        # silently (curl | tar pipe errors, missing extracted binary,
        # sign_update key-format rejection) the log points straight
        # at the failing stage without needing a rerun.
        run: |
          set -uo pipefail
          echo "::group::Secret sanity"
          echo "secret length: ${#SPARKLE_ED_PRIVATE_KEY}"
          if [[ -z "$SPARKLE_ED_PRIVATE_KEY" ]]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is not set (length 0). Settings → Secrets and variables → Actions → Repository secrets → exact-name SPARKLE_ED_PRIVATE_KEY entry." >&2
            exit 1
          fi
          # Sparkle 2.6's sign_update accepts ONLY two base64 formats
          # (see Sparkle/common_cli/secret.swift#secretUsesRegularSeed):
          #   - 32 bytes (new format, raw Ed25519 seed) → 44 chars
          #     base64 with one '=' padding
          #   - 96 bytes (legacy, 64-byte expanded priv + 32-byte pub)
          #     → 128 chars base64 with no padding
          # GitHub's secret editor occasionally appends a newline when
          # the textarea loses focus; strip whitespace before checking.
          key_value=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | tr -d '[:space:]')
          echo "trimmed length: ${#key_value}"
          if [[ -z "$key_value" ]]; then
            echo "::error::Secret value is whitespace-only after trimming. Re-paste the base64 key (44 chars for a 32-byte seed, 128 chars for the legacy 96-byte format)." >&2
            exit 1
          fi
          if [[ ${#key_value} -ne 44 && ${#key_value} -ne 128 ]]; then
            echo "::warning::expected 44 chars (32B seed) or 128 chars (96B legacy), got ${#key_value} — sign_update will reject the key. See Sparkle/common_cli/secret.swift."
          fi
          echo "::endgroup::"

          echo "::group::Download Sparkle 2.6.0 tools"
          SPARKLE_VERSION="2.6.0"
          tmp="$RUNNER_TEMP/sparkle"
          mkdir -p "$tmp"
          tar_url="https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "downloading $tar_url"
          if ! curl -fsSL "$tar_url" -o "$tmp/sparkle.tar.xz"; then
            echo "::error::curl failed fetching Sparkle tarball (HTTP or network error)" >&2
            exit 1
          fi
          echo "downloaded bytes: $(wc -c <"$tmp/sparkle.tar.xz")"
          if ! tar -xJf "$tmp/sparkle.tar.xz" -C "$tmp"; then
            echo "::error::tar failed to extract Sparkle tarball (corrupt download?)" >&2
            exit 1
          fi
          sign_tool="$tmp/bin/sign_update"
          if [[ ! -x "$sign_tool" ]]; then
            echo "::error::sign_update not found at $sign_tool after extraction" >&2
            echo "tarball listing:" >&2
            tar -tJf "$tmp/sparkle.tar.xz" | grep -i sign_update >&2 || true
            exit 1
          fi
          echo "sign_update: $("$sign_tool" -h 2>&1 | head -1 || true)"
          echo "::endgroup::"

          echo "::group::Prepare key file + sign"
          key_file="$RUNNER_TEMP/sparkle_ed_private_key"
          umask 077
          printf '%s' "$key_value" > "$key_file"
          trap 'shred -u "$key_file" 2>/dev/null || rm -f "$key_file"' EXIT
          zip_path="${{ steps.zip.outputs.zip_path }}"
          echo "signing archive: $zip_path ($(wc -c <"$zip_path") bytes)"
          # Capture stdout + stderr + exit code separately so we can
          # surface sign_update's own error messages if it rejects
          # the key or archive.
          set +e
          attributes=$("$sign_tool" -f "$key_file" "$zip_path" 2> "$tmp/sign.err")
          sign_rc=$?
          set -e
          if [[ $sign_rc -ne 0 || -z "$attributes" ]]; then
            echo "::error::sign_update exit $sign_rc" >&2
            echo "----- sign_update stderr -----" >&2
            cat "$tmp/sign.err" >&2 || true
            echo "------------------------------" >&2
            exit 1
          fi
          echo "signed: $attributes"
          echo "attributes=$attributes" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Generate appcast.xml
        if: steps.channel.outputs.is_stable == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          ZIP_NAME: ${{ steps.zip.outputs.zip_name }}
          SIGN_ATTRIBUTES: ${{ steps.sign.outputs.attributes }}
          REPO: ${{ github.repository }}
        run: bash scripts/generate_appcast.sh > dist/appcast.xml

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Stable finals (v1.0.0 etc.) land as a non-prerelease so
          # that `releases/latest/download/appcast.xml` resolves to
          # them. rc / beta tags stay flagged as pre-release; since
          # they skip the appcast generation step, their Release has
          # no appcast.xml asset and so never wins the "latest" race.
          prerelease: ${{ steps.channel.outputs.is_stable != 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            **Distribution: ad-hoc codesigned (Developer ID pending).**

            ### Install

            Grab `Pulse-<version>.dmg`, double-click to mount, drag
            `Pulse.app` onto the Applications symlink, eject the
            volume. The `.dmg` also makes Sparkle's "must be in
            Applications folder" check happy on the next update.

            First launch still needs the Gatekeeper dance once:
            right-click `/Applications/Pulse.app` → Open → Open
            (ad-hoc codesign, no Developer ID yet), or run
            `xattr -dr com.apple.quarantine /Applications/Pulse.app`.

            ### Updates

            From this version on, Pulse auto-updates through **Sparkle**
            on a manual *Check for updates…* click — bundles are
            EdDSA-signed so the updater verifies every download before
            it replaces the running app, and the in-place replace does
            NOT re-trigger Gatekeeper or re-prompt for Input Monitoring /
            Accessibility permissions.

            The `.zip` is what Sparkle downloads during auto-update.
            Manual reinstallers can grab either `.zip` or `.dmg`;
            `.sha256` sidecars let you verify the download against the
            values published on GitHub.

            Developer ID signing + notarization (so the first-launch
            right-click is not needed either) are still deferred; see
            `CHANGELOG.md` and `docs/07-distribution.md`.

            Auto-generated changelog below — merged PRs since the
            previous tag.
          files: |
            ${{ steps.zip.outputs.zip_path }}
            ${{ steps.zip.outputs.zip_path }}.sha256
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sha256
            dist/appcast.xml
